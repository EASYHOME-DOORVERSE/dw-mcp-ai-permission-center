name: 功能请求
description: 提交一个功能建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请描述你希望添加的功能。
  - type: textarea
    id: problem
    attributes:
      label: 问题背景
      description: 描述你遇到的问题或痛点
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 描述你期望的功能实现方式
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 是否考虑过其他替代方案？
    validations:
      required: false
  - type: dropdown
    id: module
    attributes:
      label: 相关模块
      options:
        - 后端服务 (dw-mcp-permission-server)
        - 前端界面 (dw-mcp-permission-ui)
        - API 模块 (dw-mcp-permission-api)
        - MCP 协议
        - 文档
        - 其他
    validations:
      required: true
