name: Bug 报告
description: 提交一个 Bug 报告帮助我们改进
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提交 Bug 报告！请尽可能详细地填写以下信息。
  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 清晰简洁地描述这个 Bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 详细的复现步骤
      placeholder: |
        1. 访问 '...'
        2. 点击 '...'
        3. 出现错误
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 描述你期望发生什么
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 描述实际发生了什么
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: 影响模块
      options:
        - 后端服务 (dw-mcp-permission-server)
        - 前端界面 (dw-mcp-permission-ui)
        - API 模块 (dw-mcp-permission-api)
        - MCP 协议
        - 其他
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 你的运行环境
      placeholder: |
        - OS: Windows 11
        - JDK: 21
        - MySQL: 8.0
        - Browser: Chrome 120
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      description: 粘贴相关的错误日志或截图
      render: shell
    validations:
      required: false
